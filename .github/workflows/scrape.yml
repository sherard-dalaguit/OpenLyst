name: Scrape Remote Jobs

on:
  workflow_dispatch: {} # run manually from Actions tab
  schedule:
    - cron: "0 6 * * *"
concurrency:
  group: scrape-remote-jobs
  cancel-in-progress: true # avoid overlapping scrapes

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45 # plenty for a 10–15 min scrape
    env:
      NODE_ENV: production
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      SITE_URL: https://www.remoteradar.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      # Install Chromium + OS deps for Playwright on the runner
      - name: Install Playwright (Chromium) + deps
        run: npx playwright install --with-deps chromium

      # If your scraper is TypeScript and uses "@/..." path aliases, use tsx + tsconfig-paths:
      - name: Run scraper
        run: npx ts-node -r tsconfig-paths/register scripts/run-scraper.ts | tee scraper-output.txt

      # (Optional) quick DB sanity check right after the run
      - name: Count last-hour inserts
        run: |
          node -e "
            const m=require('mongoose');
            (async()=>{
              await m.connect(process.env.MONGODB_URI);
              const Job=require('./dist/database/job.model').default || require('./database/job.model').default;
              const since=new Date(Date.now()-60*60*1000);
              const byCreated=await Job.countDocuments({ createdAt: { $gt: since } });
              let byPosted=0; try { byPosted=await Job.countDocuments({ postedAt: { $gt: since } }); } catch {}
              console.log('Docs last hour → createdAt:', byCreated, 'postedAt:', byPosted);
              await m.disconnect();
            })().catch(e=>{ console.error(e); process.exit(1); });
          " | tee db-count.txt

      # Nice summary in the Actions UI
      - name: Summary
        if: always()
        run: |
          {
            echo "### Scrape Summary"
            echo ""
            echo "#### Scraper Output"
            echo '```'
            cat scraper-output.txt || true
            echo '```'
            echo ""
            echo "#### DB Counts (last hour)"
            echo '```'
            cat db-count.txt || true
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
