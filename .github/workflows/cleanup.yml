name: Cleanup Old Jobs

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 0 * * *"

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call cleanup API
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          response=$(curl -s -o response.json -w "%{http_code}" \
            --max-time 300 \
            "$SITE_URL/api/cron/cleanup")
          echo "HTTP status: $response"
          cat response.json
          if [ "$response" != "200" ]; then
            echo "Cleanup API returned non-200 status: $response"
            exit 1
          fi